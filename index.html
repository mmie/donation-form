<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Donation Form</title>
  <style>
    :root {
      --brand-navy: #123a67;
      --brand-blue: #1f6aa5;
      --surface: #ffffff;
      --page-bg: #eef3f8;
      --text-primary: #1e2937;
      --text-muted: #5f6f82;
      --border: #d8e0ea;
      --shadow: 0 14px 40px rgba(17, 38, 64, 0.10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #354349;
      color: var(--text-primary);
      font-family: "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.45;
    }

    .bloomerang-page {
      width: min(1120px, 100% - 32px);
      margin: 24px auto 48px;
    }

    .bloomerang-card-brand {
      max-width: 600px;
      margin: 0 auto 20px;
      box-sizing: border-box;
      text-align: left;
      border-bottom: 1px solid #e4ebf3;
      padding-bottom: 16px;
    }

    .bloomerang-card-brand img {
      display: block;
      max-width: 320px;
      width: min(100%, 320px);
      height: auto;
      margin: 0;
    }

    .bloomerang-layout {
      display: grid;
      grid-template-columns: minmax(0, 2.3fr) minmax(240px, 1fr);
      gap: 22px;
      align-items: start;
    }

    .bloomerang-form-card,
    .bloomerang-contact-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }

    .bloomerang-form-card {
      padding: 22px 22px 0;
      min-height: 160px;
    }

    .bloomerang-contact-card {
      padding: 22px;
      position: sticky;
      top: 16px;
    }

    .bloomerang-contact-card h2 {
      margin: 0 0 8px;
      color: var(--brand-navy);
      font-size: 1.3rem;
    }

    .bloomerang-contact-card p {
      margin: 0 0 10px;
      color: var(--text-muted);
    }

    .bloomerang-contact-card a {
      color: var(--brand-blue);
      font-weight: 600;
      text-decoration: none;
    }

    .bloomerang-contact-card a:hover { text-decoration: underline; }

    .bloomerang-contact-details {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #e4ebf3;
      color: var(--text-muted);
      font-size: 0.96rem;
    }

    .bloomerang-contact-details strong {
      color: var(--text-primary);
      display: block;
      margin-bottom: 4px;
    }

    .bloomerang-form-slot #donation-form-container,
    .bloomerang-form-slot #donation-processing-container {
      margin: 0 !important;
    }

    .bloomerang-form-wrapper {
      max-width: 600px;
      margin: 24px auto 40px;
      padding: 0;
      width: 100%;
    }

    .bloomerang-form-slot .donation-form {
      font-family: "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif !important;
      color: var(--text-primary);
    }

    .bloomerang-form-slot .donation-form .section {
      border: 1px solid #e2e9f2;
      border-radius: 12px;
      background: #fdfefe;
      margin-bottom: 14px;
      padding: 14px !important;
    }

    .bloomerang-form-slot .donation-form h3 {
      margin: 0 0 10px;
      font-size: 1.1rem;
      color: var(--brand-navy);
    }

    .bloomerang-form-slot .donation-form .field {
      margin: 6px 0;
      padding: 4px 0 !important;
    }

    .bloomerang-form-slot .donation-form .section.donation .field.radio {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: nowrap;
      overflow: hidden;
    }

    .bloomerang-form-slot .donation-form .section.donation .field.radio input[name="donation-level"] {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      width: 0 !important;
      height: 0;
      min-height: 0;
      margin: 0;
      padding: 0;
    }

    .bloomerang-form-slot .donation-form .section.donation .field.radio .custom-donation-amount {
      width: 120px !important;
      min-height: 40px;
      margin-left: 10px;
      font-weight: 600;
      text-align: right;
      flex: 0 0 120px;
    }

    .bloomerang-form-slot .donation-form .field input,
    .bloomerang-form-slot .donation-form .field select,
    .bloomerang-form-slot .donation-form .field textarea,
    .bloomerang-form-slot .donation-form #card-element {
      width: 100% !important;
      max-width: 100% !important;
      border: 1px solid #c8d5e5;
      border-radius: 9px;
      padding: 11px 12px !important;
      min-height: 44px;
      background: #fff;
    }

    .bloomerang-form-slot .donation-form .field label {
      color: #243447;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .bloomerang-form-slot .donation-form .field.radio label,
    .bloomerang-form-slot .donation-form .field.checkbox label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
    }

    .bloomerang-form-slot .donation-form .section.donation .field.radio label {
      flex: 1 1 auto;
      margin: 0;
      min-width: 0;
    }

    .bloomerang-form-slot .donation-form .section.donation .field.radio .label {
      flex: 1 1 auto;
      min-width: 0;
    }

    .bloomerang-form-slot .donation-form .field.radio input,
    .bloomerang-form-slot .donation-form .field.checkbox input {
      width: auto !important;
      min-height: auto;
      margin-top: 2px;
    }

    .bloomerang-form-slot .donation-form .btn-group {
      margin-top: 12px;
    }

    .bloomerang-form-slot .btn-group .btn-submit-donation,
    .bloomerang-form-slot #express-submit {
      min-height: 46px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #1f6aa5, #174f7b);
      color: #fff;
      font-weight: 700;
      letter-spacing: 0.01em;
      padding: 12px 22px !important;
      box-shadow: 0 8px 18px rgba(31, 106, 165, 0.3);
    }

    .bloomerang-form-slot .btn-group .btn-submit-donation:hover,
    .bloomerang-form-slot #express-submit:hover {
      filter: brightness(1.03);
      transform: translateY(-1px);
    }

    .bloomerang-form-slot .errors {
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
    }

    @media (max-width: 900px) {
      .bloomerang-layout {
        grid-template-columns: 1fr;
      }

      .bloomerang-contact-card {
        position: static;
      }
    }
  </style>
</head>

      </aside>
    </section>
  </main>

  Bloomerang.Util.calculateDonationTrueImpact = function() {
    if (!jQuery(".donation-form .true-impact .fee-amount").length) { return; }
    var amount = Bloomerang.Util.getDonationAmount();
    if (amount === 0) {
      jQuery(".donation-form .true-impact .fee-amount").text(accounting.formatMoney(0));
      return 0;
    }
    var feeRate = Bloomerang.transactionFeeRate;
    var newTotal = (amount + Bloomerang.transactionFee) / (1 - feeRate);
    var impactAmount = Number((newTotal - amount).toFixed(2));
    jQuery(".donation-form .true-impact .fee-amount").text(accounting.formatMoney(impactAmount));
    return impactAmount;
  };

  Bloomerang.Util.getDonationTrueImpactAmount = function() {
    if (jQuery(".donation-form .true-impact input:checked").length) { return Bloomerang.Util.calculateDonationTrueImpact(); }
    return 0;
